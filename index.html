<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Madam President</title>

  <!-- Google Font (Cursive Royal Style) -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at center, #0a0a0a, #000000);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
      overflow: hidden;
    }

    /* Madam President Text */
    .title {
      font-family: 'Great Vibes', cursive;
      font-size: 70px;
      color: #ffffff;
      letter-spacing: 3px;
      opacity: 0;
      white-space: nowrap;
      border-right: 2px solid white;
      overflow: hidden;
      width: 0;
    }

    /* Typing Animation */
    .typing {
      animation: typing 3s steps(20, end) forwards, blink 0.7s infinite;
      opacity: 1;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    /* Message Box */
    .message-box {
      margin-top: 40px;
      text-align: center;
      opacity: 0;
      transition: 1s;
    }

    .message-box.show {
      opacity: 1;
    }

    .message {
      font-size: 20px;
      color: #ddd;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    /* Button */
    .btn {
      padding: 12px 30px;
      font-size: 16px;
      border: 1px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
      border-radius: 30px;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }
  </style>
</head>

<body>

  <div class="title" id="title">Madam President</div>

  <div class="message-box" id="messageBox">
    <div class="message">Attention: This experience is exclusive.</div>
    <button class="btn">Continue</button>
  </div>

  <script>
    // Start typing after 3 seconds
    setTimeout(() => {
      document.getElementById("title").classList.add("typing");
    }, 3000);

    // Show message after typing ends
    setTimeout(() => {
      document.getElementById("messageBox").classList.add("show");
    }, 6500);
  </script>

</body>
</html>
