<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Madam President</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: radial-gradient(circle, #0a0a0a, #000);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  font-family: 'Poppins', sans-serif;
}

/* TITLE */
.title {
  font-family: 'Great Vibes', cursive;
  font-size: 70px;
  opacity: 0;
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
}

.typing {
  animation: typing 3s steps(25, end) forwards, blink 0.7s infinite;
  opacity: 1;
}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

@keyframes blink {
  50% { border-color: transparent }
}

/* MESSAGE */
.message-box {
  margin-top: 40px;
  text-align: center;
  opacity: 0;
  transition: 1s;
}

.show {
  opacity: 1;
}

.btn {
  padding: 12px 30px;
  border-radius: 30px;
  border: 1px solid white;
  background: transparent;
  color: white;
  cursor: pointer;
}

.btn:hover {
  background: white;
  color: black;
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.popup.active {
  display: flex;
}

.popup h2 {
  font-family: 'Great Vibes', cursive;
  font-size: 40px;
  margin-bottom: 20px;
}

/* COUNTDOWN */
.countdown {
  display: flex;
  gap: 20px;
  margin: 20px 0;
}

.time-box {
  border: 1px solid white;
  padding: 15px;
  border-radius: 10px;
  min-width: 70px;
}

.time-box span {
  font-size: 22px;
  display: block;
}

/* TOGGLE */
.toggle {
  margin-top: 30px;
  cursor: pointer;
  font-size: 20px;
  border-bottom: 1px solid white;
}

.hidden-content {
  max-height: 0;
  overflow: hidden;
  transition: 0.5s;
}

.hidden-content.show {
  max-height: 200px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="title" id="title">Madam President</div>

<div class="message-box" id="messageBox">
  <p>Attention: Exclusive Access Only</p>
  <button class="btn" onclick="openPopup()">Continue</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">

  <h2>A Special Message</h2>

  <p>Something extraordinary is being prepared for you...</p>

  <!-- COUNTDOWN -->
  <div class="countdown">
    <div class="time-box"><span id="days">00</span>Days</div>
    <div class="time-box"><span id="hours">00</span>Hours</div>
    <div class="time-box"><span id="minutes">00</span>Minutes</div>
    <div class="time-box"><span id="seconds">00</span>Seconds</div>
  </div>

  <!-- TOGGLE -->
  <div class="toggle" onclick="toggleMessage()">
    Official Message to Madam President
  </div>

  <div class="hidden-content" id="hiddenContent">
    <p>This message is reserved for a remarkable presence.</p>
  </div>

</div>

<script>

// typing animation
setTimeout(() => {
  document.getElementById("title").classList.add("typing");
}, 3000);

// show message
setTimeout(() => {
  document.getElementById("messageBox").classList.add("show");
}, 6500);

// open popup
function openPopup() {
  document.getElementById("popup").classList.add("active");
}

// toggle
function toggleMessage() {
  document.getElementById("hiddenContent").classList.toggle("show");
}

// COUNTDOWN
const targetDate = new Date("April 23, 2026 00:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const gap = targetDate - now;

  const days = Math.floor(gap / (1000 * 60 * 60 * 24));
  const hours = Math.floor((gap / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((gap / (1000 * 60)) % 60);
  const seconds = Math.floor((gap / 1000) % 60);

  document.getElementById("days").innerText = days;
  document.getElementById("hours").innerText = hours;
  document.getElementById("minutes").innerText = minutes;
  document.getElementById("seconds").innerText = seconds;

}, 1000);

</script>

</body>
</html>
